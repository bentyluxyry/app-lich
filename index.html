<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Vạn Niên 2025 & Trợ Lý AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%2316a34a'/%3E%3Cpath d='M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            screens: {
                '3xl': '1600px', 
            },
            colors: {
              green: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 800: '#166534' },
              dark: '#1a1a1a', 
            },
            fontFamily: { 
              sans: ['Inter', 'system-ui', 'sans-serif'],
              serif: ['Playfair Display', 'serif']
            }
          }
        }
      }
    </script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="css/fortune.css">

    <!-- Gemini AI Import Map -->
    <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.run/@google/genai",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "vite": "https://aistudiocdn.com/vite@^7.2.6",
    "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
  }
}
</script>
    <script>window.process = { env: { API_KEY: '' } };</script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col pb-0">

    <!-- Header / Navigation -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex items-center gap-2 cursor-pointer" onclick="app.navigate('HOME')">
                    <div class="w-8 h-8 bg-green-600 rounded text-white flex items-center justify-center font-bold text-lg">L</div>
                    <span class="font-bold text-xl text-green-700 tracking-tight">LịchViệt<span class="text-orange-500">.AI</span></span>
                </div>

                <!-- Desktop Menu -->
                <div id="desktop-menu" class="hidden md:flex items-center space-x-1 h-16">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </header>

    <!-- Top Bar: Xu hướng & Breadcrumbs -->
    <div id="top-bar" class="w-full bg-white border-b border-gray-200">
        <!-- Rendered by JS -->
    </div>

    <!-- Main Content -->
    <main id="app" class="flex-grow w-full max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <!-- Nội dung sẽ được render bởi main.js -->
    </main>

    <!-- Compact Footer -->
    <footer id="main-footer" class="bg-[#1a1a1a] text-gray-400 mt-auto border-t border-gray-800">
        <div class="max-w-screen-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col md:flex-row items-center justify-between gap-4 md:gap-8">
                
                <!-- Brand & Copyright -->
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-green-600 rounded text-white flex items-center justify-center font-bold text-sm">L</div>
                    <div class="flex flex-col">
                        <span class="font-bold text-gray-100 text-sm tracking-tight">LịchViệt.AI</span>
                        <span class="text-[10px] text-gray-500">© 2025 Powered by Google Gemini</span>
                    </div>
                </div>

                <!-- Simple Links -->
                <div class="flex items-center gap-6 text-xs font-medium">
                    <a onclick="app.navigate('HOME')" class="hover:text-green-500 cursor-pointer transition">Trang chủ</a>
                    <a onclick="app.filterBlog('PHONG_THUY')" class="hover:text-green-500 cursor-pointer transition">Phong Thủy</a>
                    <a onclick="app.navigate('ASSISTANT')" class="hover:text-green-500 cursor-pointer transition">Trợ Lý AI</a>
                    <a href="#" class="hover:text-green-500 cursor-pointer transition">Liên hệ</a>
                </div>

                <!-- Socials (Small) -->
                <div class="flex gap-3">
                    <a href="#" class="w-7 h-7 rounded bg-gray-800 flex items-center justify-center hover:bg-blue-600 hover:text-white transition text-gray-500">
                        <span class="text-xs font-bold">f</span>
                    </a>
                    <a href="#" class="w-7 h-7 rounded bg-gray-800 flex items-center justify-center hover:bg-red-600 hover:text-white transition text-gray-500">
                        <span class="text-xs font-bold">y</span>
                    </a>
                </div>
            </div>
        </div>
        <!-- Spacer for Mobile Bottom Nav -->
        <div class="h-16 md:hidden bg-[#1a1a1a]"></div>
    </footer>

    <!-- Mobile Sidebar Menu (Drawer from Left) -->
    <!-- Cập nhật class bg-[#1a1a1a] và text-white -->
    <div id="menu-overlay" onclick="app.closeMenu()" class="fixed inset-0 bg-black/50 z-[60] hidden transition-opacity duration-300"></div>
    <div id="mobile-menu" class="fixed top-0 left-0 h-full w-[300px] bg-[#1a1a1a] text-white z-[70] transform -translate-x-full transition-transform duration-300 shadow-2xl flex flex-col font-sans">
        <!-- Rendered by JS -->
    </div>

    <!-- Bottom Navigation Bar (Mobile Only) -->
    <div id="bottom-nav" class="fixed bottom-0 left-0 w-full bg-[#1a1a1a] text-gray-400 border-t border-gray-800 z-50 md:hidden pb-safe">
        <div class="grid grid-cols-5 h-16">
            <!-- 1. Menu -->
            <button onclick="app.toggleMenu()" class="flex flex-col items-center justify-center hover:text-white group">
                <svg class="w-6 h-6 mb-1 group-hover:text-green-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                <span class="text-[10px] font-medium">Menu</span>
            </button>
            
            <!-- 2. Tìm kiếm -->
            <button onclick="app.toggleSearch()" class="flex flex-col items-center justify-center hover:text-white group">
                <svg class="w-6 h-6 mb-1 group-hover:text-green-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span class="text-[10px] font-medium">Tìm kiếm</span>
            </button>

            <!-- 3. Trang chủ / Lịch (Active) -->
            <button onclick="app.navigate('HOME')" class="flex flex-col items-center justify-center text-white relative group">
                <div class="absolute -top-4 bg-green-600 rounded-full p-3 shadow-lg border-4 border-[#1a1a1a]">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <span class="text-[10px] font-bold mt-8 text-green-500">Lịch</span>
            </button>

            <!-- 4. Trợ lý AI -->
            <button onclick="app.navigate('ASSISTANT')" class="flex flex-col items-center justify-center hover:text-white group">
                <svg class="w-6 h-6 mb-1 group-hover:text-green-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="text-[10px] font-medium">Trợ lý</span>
            </button>

            <!-- 5. Liên hệ (Scroll to Footer) -->
            <button onclick="app.scrollToFooter()" class="flex flex-col items-center justify-center hover:text-white group">
                <svg class="w-6 h-6 mb-1 group-hover:text-green-500 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                <span class="text-[10px] font-medium">Liên hệ</span>
            </button>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="search-modal" class="fixed inset-0 bg-black/50 z-[80] hidden flex items-start justify-center pt-20">
        <div class="bg-white rounded-xl w-full max-w-lg p-4 shadow-2xl animate-fade-in mx-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg">Tìm kiếm</h3>
                <button onclick="app.toggleSearch()" class="text-gray-400 hover:text-gray-600">✕</button>
            </div>
            <input id="search-input" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:ring-2 focus:ring-green-500 outline-none" placeholder="Nhập từ khóa..." onkeyup="app.handleSearchInput(this.value)">
            <div id="search-results" class="max-h-60 overflow-y-auto space-y-2"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
